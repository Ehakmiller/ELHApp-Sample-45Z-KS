<script>
(function() {
  function syncCityLabels() {
    var map = map_967b25b5d7e5dff56d7f3f52a3f47dbc;
    var labels = feature_group_019369c8947df84a8891e5095c9ff6cb;
    if(!map || !labels) return;

    // Match your CSS breakpoint: phone is <= 768px
    var desktop = window.matchMedia("(min-width: 769px)").matches;

    if(desktop) {
      if(!map.hasLayer(labels)) map.addLayer(labels);
    } else {
      if(map.hasLayer(labels)) map.removeLayer(labels);
    }
  }

  // run once after render
  setTimeout(syncCityLabels, 0);

  // keep correct if someone rotates/resizes
  window.addEventListener("resize", function() {
    clearTimeout(window.__cityLblTimer);
    window.__cityLblTimer = setTimeout(syncCityLabels, 150);
  });
})();
</script>
    
<script>
(function() {
  var map = map_967b25b5d7e5dff56d7f3f52a3f47dbc;

  function isTouch() {
    return (('ontouchstart' in window) ||
            (navigator.maxTouchPoints && navigator.maxTouchPoints > 0));
  }

  function killTooltips(layer) {
    if(!layer) return;

    // remove bound tooltip if present
    if (typeof layer.unbindTooltip === "function") {
      try { layer.unbindTooltip(); } catch(e) {}
    }

    // recurse into groups
    if (typeof layer.eachLayer === "function") {
      layer.eachLayer(killTooltips);
    }
  }

  function nukeTooltipDom() {
    document.querySelectorAll(".leaflet-tooltip").forEach(function(el) {
      el.parentNode && el.parentNode.removeChild(el);
    });
  }

  map.whenReady(function() {
    if(!isTouch()) return;

    // 1) remove any existing tooltips
    map.eachLayer(killTooltips);
    nukeTooltipDom();

    // 2) prevent future tooltip binding (strongest fix)
    if(window.L && L.Layer && L.Layer.prototype) {
      var orig = L.Layer.prototype.bindTooltip;
      L.Layer.prototype.bindTooltip = function() { return this; };
    }
  });
})();
</script>

<script>
const charts = {
  state: "state_avg.png?v=121625",
  top_ten: "lcfs_top_ten.png?v=121625"
};


function openChart(key){
  const src = charts[key] || "";
  if(!src) return;
  document.getElementById("chart-img").src = src;
  document.getElementById("chart-modal").style.display = "block";
}

function openChartNewTab(key){
  const src = charts[key] || "";
  if(!src) return;
  window.open(src, "_blank", "noopener,noreferrer");
}

function closeChart(e){
  if(e.target.id === "chart-modal") {
    forceClose();
  }
}

function forceClose(){
  document.getElementById("chart-modal").style.display = "none";
  document.getElementById("chart-img").src = "";
}

function toggleCharts(){
  const p = document.getElementById("chart-panel");
  if(!p) return;
  p.style.display = (p.style.display === "none" || p.style.display === "") ? "block" : "none";
}

document.addEventListener("keydown", function(e){
  if(e.key === "Escape") forceClose();
});
</script>
