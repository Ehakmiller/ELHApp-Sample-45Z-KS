  /* ===== Base layout ===== */
  html, body { height: 100%; width: 100%; margin: 0; padding: 0; }
  .folium-map, div[id^="map_"] { height: 100vh !important; width: 100vw !important; }

  /* ===== Visibility helpers ===== */
  .desktop-only { display: block; }

  /* ===== Card styling (title/legend/panels) ===== */
  .map-card{
    position: fixed;
    z-index: 9999;
    background: rgba(255,255,255,0.85);
    backdrop-filter: blur(6px);
    border-radius: 14px;
    box-shadow: 0 10px 25px rgba(0,0,0,0.18);

    padding: 10px 12px;
    font-family: Arial, sans-serif;
  }

  .map-title{
    top: 10px;
    left: 50%;
    transform: translateX(-50%);

    text-align: center;
  }
  .map-title h3{ margin: 0; font-size: 18px; line-height: 1.15; }

  .map-legend{
    top: 40px;
    right: 10px;
    max-width: min(60vw, 360px);

  /* ===== Charts button (DESKTOP) ===== */
.fab{
  position: fixed;
  bottom: 110px;     /* <-- move up/down here */
  left: 12px;        /* <-- move left/right here */
  z-index: 9999;
  padding: 10px 12px;
  border-radius: 999px;
  border: 1px solid rgba(0,0,0,0.15);
  background: rgba(255,255,255,0.90);

  cursor: pointer;
  font-family: Arial, sans-serif;
  font-weight: 800;
}

/* Panel anchored near the button */
.chart-panel{
  top: auto !important;
  bottom: 170px;     /* <-- keep above the button */
  left: 12px;
  width: 190px;
}


  /* ===== Leaflet controls ===== */
  .leaflet-top, .leaflet-bottom{ z-index: 9000 !important; }

  .leaflet-control-layers{ font-size: 14px; }
  .leaflet-control-layers-toggle{ width: 44px !important; height: 44px !important; }
  .leaflet-control-layers-expanded{
    max-height: 60vh !important;
    overflow-y: auto !important;
  }

  /* Layer control positioning (desktop) */
  .leaflet-top.leaflet-right .leaflet-control-layers{
    margin-top: 2px !important;
  }
  
  @media (max-width: 768px){
  /* Align Layer Control with market watermark */
  .leaflet-top.leaflet-right .leaflet-control-layers{
    margin-top: -6px !important;   /* 100 (wm top) - 65 (stack top) */
    margin-right: 10px !important; /* match wm right */
  }
}

 /* ===== Keep top-right controls (incl. colorbar) BELOW the fixed title ===== */
:root{
  /* title sits at ~10px; add safe-area for iOS notches too */
  --safe-top: env(safe-area-inset-top, 0px);
  --title-offset: 1px;

  /* IMPORTANT: reserve vertical space for your fixed title card
     (tweak 60–90px until it clears your title nicely) */
  --title-block: 50px;

  --controls-gap: 8px;
}

/* Push ALL Leaflet top-right controls down (legend/colorbar/layer control if it’s there) */
.leaflet-top.leaflet-right{
  top: calc(var(--safe-top) + var(--title-offset) + var(--title-block) + var(--controls-gap)) !important;
}

/* Legend itself: keep it snug to the right, no "raise" */
.leaflet-top.leaflet-right .legend.leaflet-control{
  margin-top: 0px !important;
  margin-right: 12px !important;  /* replace your 45px if you want */
}

/* (Optional) Mobile tweak */
@media (max-width: 700px){
  :root{ --title-block: 84px; }
}

    

  /* ===== Watermarks ===== */
 .market-watermark{
  position: fixed;
  top: 125px;     /* <-- lowered so it clears the colorbar */
  right: 75px;
  z-index: 9999;
  padding: 2px;
}

    pointer-events: none !important;
    background: transparent !important;
    border: none !important;
  }

  /* ===== Mobile overrides ===== */
  @media (max-width: 768px){
    .desktop-only { display:none !important; }
    .map-title h3{ font-size: 16px; }

    /* Move the whole right control stack down (prevents crowding at top) */
    .leaflet-top.leaflet-right{ top: 65px !important; }

    /* Colorbar closer to right edge on phone */

      margin-right: 10px !important;
    }
    .legend.leaflet-control svg g.tick text{
      font-size: 12px !important;
    }

    /* Legend card at bottom — moved UP 20px */

      bottom: 65px !important;
      top: auto !important;
      left: 10px !important;
      right: 10px !important;
      max-width: 92vw;
    }

    .market-watermark{
      position: fixed !important;

    }

    .market-watermark img{ width: 250px; }
    .personal-watermark{ bottom: 1px; right: 1px; }
    .personal-watermark img{ width: 120px; }

    /* Disable hover tooltips on phones */
    .leaflet-tooltip{ display:none !important; }
  }

    <script>
    (function(){
      function formatTicks(){
        document
          .querySelectorAll('.legend.leaflet-control svg g.tick text')
          .forEach(function(t){
            var raw = (t.textContent || "").trim();
            if(!raw) return;
    
            // Don’t double-format
            if(raw.startsWith("$")) return;
    
            // Handle Unicode minus + commas
            var cleaned = raw.replace(/\u2212/g, "-").replace(/,/g, "").trim();
            var v = Number(cleaned);
    
            if(Number.isFinite(v)){
              t.textContent = "$" + v.toFixed(2);
            }
          });
      }
    
      function waitForLegend(){
        var svg = document.querySelector('.legend.leaflet-control svg');
        if(svg){
          formatTicks();
    
          // Re-apply if anything changes inside the legend
          var obs = new MutationObserver(function(){ formatTicks(); });
          obs.observe(svg, {subtree:true, childList:true, characterData:true});
        } else {
          setTimeout(waitForLegend, 100);
        }
      }
    
      if(document.readyState === "loading"){
        document.addEventListener("DOMContentLoaded", waitForLegend);
      } else {
        waitForLegend();
      }
    })();
    </script>

<script>
const charts = {
  state: "state_avg.png?v=122925",
  top_ten: "lcfs_top_ten.png?v=122925"
};


function openChart(key){
  const src = charts[key] || "";
  if(!src) return;
  document.getElementById("chart-img").src = src;
  document.getElementById("chart-modal").style.display = "block";
}

function openChartNewTab(key){
  const src = charts[key] || "";
  if(!src) return;
  window.open(src, "_blank", "noopener,noreferrer");
}

function closeChart(e){
  if(e.target.id === "chart-modal") {
    forceClose();
  }
}

function forceClose(){
  document.getElementById("chart-modal").style.display = "none";
  document.getElementById("chart-img").src = "";
}

function toggleCharts(){
  const p = document.getElementById("chart-panel");
  if(!p) return;
  p.style.display = (p.style.display === "none" || p.style.display === "") ? "block" : "none";
}

document.addEventListener("keydown", function(e){
  if(e.key === "Escape") forceClose();
});
</script>
