      /* ===== Base layout ===== */
      html, body { height:100%; width:100%; margin:0; padding:0; }
      .folium-map, div[id^="map_"] { height:100vh !important; width:100vw !important; }
    
      :root{
        --safe-top: env(safe-area-inset-top, 0px);
        --title-top: 10px;
        --title-block: 60px;   /* reserved space for title */
        --left-pad: 12px;      /* <-- MAIN “move left/right” knob */
        --gap: 8px;
        --market-width: 350px; /* match your image width intent */
      }
    
      /* ===== Card styling ===== */
      .map-card{
        position: fixed;
        z-index: 9999;
        background: rgba(255,255,255,0.85);
        backdrop-filter: blur(6px);
        border-radius: 14px;
        box-shadow: 0 10px 25px rgba(0,0,0,0.18);
        border: 1px solid rgba(0,0,0,0.08);
        padding: 10px 12px;
        font-family: Arial, sans-serif;
        box-sizing: border-box;
      }
    
      /* ===== Title ===== */
      .map-title{
        top: var(--title-top);
        left: 50%;
        transform: translateX(-50%);
        max-width: min(92vw, 520px);
        text-align: center;
      }
      .map-title h3{ margin:0; font-size:18px; line-height:1.15; }
    
      /* ===== Branca colorbar (LOCKED LEFT on desktop) ===== */
      .legend,
      .legend.leaflet-control,
      .leaflet-control.legend{
        position: fixed !important;
        top: calc(var(--safe-top) + var(--title-block) + var(--gap)) !important;
        top: calc(var(--safe-top) + var(--title-block) + var(--gap) + 25px) !important;
        left: calc(var(--left-pad) - 15px) !important;
        right: auto !important;
        margin: 0 !important;
        transform: none !important;
        background: transparent !important;
        border: none !important;
        box-shadow: none !important;
        padding: 0 !important;
        z-index: 9000 !important;
      }
      .legend *{ border:none !important; box-shadow:none !important; }
    
     .leaflet-control-layers.leaflet-control{
      position: fixed !important;
      top: calc(var(--safe-top) + var(--title-block) + -50px) !important;
      left: calc(var(--left-pad) + 50px) !important;  /* <-- move right by 50px */
      right: auto !important;
      margin: 0 !important;
      z-index: 30000 !important;
    }
    
      /* Bigger tap target */
      .leaflet-control-layers-toggle{ width:44px !important; height:44px !important; }
    
      /* ===== Layer control label (your “Layer Control (Click)” badge) ===== */
      .leaflet-control-layers-toggle{
        position: relative !important;
        overflow: visible !important;
      }
      .leaflet-control-layers-toggle .layer-ctl-label{
        position:absolute;
        top: 50px;
        left: 50%;
        transform: translateX(-50%);
        text-align:center;
        line-height:1.05;
        background: rgba(255,255,255,0.85);
        border: 1px solid rgba(0,0,0,0.12);
        border-radius: 12px;
        padding: 4px 10px;
        font-size: 6px;
        font-weight: 800;
        white-space: nowrap;
        color: #000 !important;
        font-family: "Space Grotesk", Arial, sans-serif !important;
        z-index: 30000!important;
        pointer-events:none;
      }
      .leaflet-control-layers.leaflet-control.leaflet-control-layers-expanded{
          z-index: 30001 !important;
        }
        
        /* Prevent any clipping of the expanded panel */
        .leaflet-top.leaflet-left,
        .leaflet-top.leaflet-left .leaflet-control{
          overflow: visible !important;
        }
    
      /* ===== Your custom legend card ===== */
      .map-legend{
        position: fixed;
        top: calc(var(--safe-top) + var(--title-block) + 80px);
        left: var(--left-pad);
        right: auto;
        width: var(--market-width);
        font-size: 12px;
      }
    
      /* ===== Market watermark (LOCKED LEFT) ===== */
      .market-watermark{
        position: fixed;
        top: calc(var(--safe-top) + var(--title-block) + 150px);
        left: var(--left-pad);   /* <-- move market box left/right */
        right: auto !important;
        z-index: 9999;
        padding: 0 !important;
      }
      .market-watermark img{ width: 350px; height:auto; opacity:0.85; }
    
      /* ===== Personal watermark ===== */
      .personal-watermark{
        position: fixed;
        bottom: 1px;
        right: 45px;
        z-index: 9999;
      }
      .personal-watermark img{ width:200px; height:auto; }
    
      /* ===== City labels ===== */
      .leaflet-div-icon.city-label-icon{
        pointer-events:none !important;
        background:transparent !important;
        border:none !important;
      }
    
      /* ===== Charts button (desktop) ===== */
      .fab{
        position: fixed;
        bottom: 110px;
        left: var(--left-pad);
        z-index: 9999;
        padding: 10px 12px;
        border-radius: 999px;
        border: 1px solid rgba(0,0,0,0.15);
        background: rgba(255,255,255,0.90);
        box-shadow: 0 10px 25px rgba(0,0,0,0.18);
        cursor: pointer;
        font-family: Arial, sans-serif;
        font-weight: 800;
      }
      .chart-panel{
        top: auto !important;
        bottom: 170px;
        left: var(--left-pad);
        width: 190px;
      }
    
      /* ===== Mobile overrides ===== */
     /* ===== Phone / touch devices only (won't affect desktop) ===== */

      :root{
        --title-block: 84px;
        --left-pad: 10px;

  .personal-watermark{ bottom:1px; right:1px; }

  /* Disable hover tooltips on phones */
  .leaflet-tooltip{ display:none !important; }
}

      
      /* DESKTOP ONLY: keep legend same width as market watermark */

    bottom: auto !important;
  }
}

    /* Desktop: keep legend card fixed width (never full width) */

      }
    }

        
        /* 2) Keep the Branca colorbar under the layer control */
        .legend,
        .legend.leaflet-control,
        .leaflet-control.legend{
          z-index: 55000 !important;
        }
        
        /* 3) Force layer control (and its expanded panel) ABOVE the colorbar */
        .leaflet-control-layers.leaflet-control{
          z-index: 65000 !important;
        }

    .leaflet-control-layers.leaflet-control.leaflet-control-layers-expanded{
      z-index: 65001 !important;
    }
    
    /* 4) Make sure the expanded list itself is also on top */
    .leaflet-control-layers.leaflet-control .leaflet-control-layers-list{
      position: relative !important;
      z-index: 65002 !important;
    }

          /* ================================
       FINAL STACKING OVERRIDE (BOTTOM)
       Goal: LayerControl expanded ABOVE Branca colorbar
       ================================ */
    
    /* Branca colorbar (the "color bar") -> keep it visible but BELOW controls */
    div.legend,
    div.legend.leaflet-control,
    .leaflet-control.legend{
      z-index: 12000 !important;      /* <-- LOWER */
      pointer-events: none !important; /* <-- won't steal clicks */
    }
    
    /* Layer control toggle + expanded panel -> ALWAYS ABOVE colorbar */
    .leaflet-control-layers,
    .leaflet-control-layers.leaflet-control,
    .leaflet-control-layers.leaflet-control.leaflet-control-layers-expanded,
    .leaflet-control-layers .leaflet-control-layers-list{
      z-index: 25000 !important;      /* <-- HIGHER than colorbar */
      pointer-events: auto !important;
    }
    
        /* =========================================================
       CORNER STACK FIX (put at very bottom of CSS)
       Make TOP-LEFT corner paint above TOP-RIGHT corner
       so LayerControl can overlay Branca colorbar.
       ========================================================= */
    
    /* Raise the entire TOP-LEFT corner (LayerControl lives here) */
    .leaflet-top.leaflet-left{
      z-index: 90000 !important;
    }
    
    /* Lower the TOP-RIGHT corner (Branca colorbar usually lives here) */
    .leaflet-top.leaflet-right{
      z-index: 10000 !important;
    }
    
    /* Keep bottom corners below as well (safe) */
    .leaflet-bottom.leaflet-left,
    .leaflet-bottom.leaflet-right{
      z-index: 8000 !important;
    }
    
    /* LayerControl itself: super high (inside top-left) */
    .leaflet-top.leaflet-left .leaflet-control-layers{
      z-index: 99999 !important;
    }
    .leaflet-top.leaflet-left .leaflet-control-layers.leaflet-control-layers-expanded{
      z-index: 100000 !important;
    }
    .leaflet-top.leaflet-left .leaflet-control-layers .leaflet-control-layers-list{
      position: relative !important;
      z-index: 100001 !important;
    }
    
    /* Colorbar: keep it low + click-through (inside top-right) */
    .leaflet-top.leaflet-right .legend,
    .leaflet-top.leaflet-right .legend.leaflet-control,
    .leaflet-top.leaflet-right .leaflet-control.legend{
      z-index: 1 !important;
      pointer-events: none !important;
    }

<script>
(function(){
  function formatTicks(){
    document
      .querySelectorAll('.legend svg g.tick text')
      .forEach(function(t){
        var raw = (t.textContent || "").trim();
        if(!raw) return;

        // Don't double-format
        if(raw.startsWith("$")) return;

        // Handle unicode minus + commas
        var cleaned = raw.replace(/\u2212/g, "-").replace(/,/g, "").trim();
        var v = Number(cleaned);

        if(Number.isFinite(v)){
          t.textContent = "$" + v.toFixed(2);
        }
      });
  }

  function waitForLegend(){
    var svg = document.querySelector('.legend.leaflet-control svg');
    if(svg){
      formatTicks();
      var obs = new MutationObserver(function(){ formatTicks(); });
      obs.observe(svg, {subtree:true, childList:true, characterData:true});
    } else {
      setTimeout(waitForLegend, 100);
    }
  }

  if(document.readyState === "loading"){
    document.addEventListener("DOMContentLoaded", waitForLegend);
  } else {
    waitForLegend();
  }
})();
</script>
    
<script>
(function(){
  function addLabel(){
    var toggle = document.querySelector('.leaflet-control-layers-toggle');
    if(!toggle){ setTimeout(addLabel, 100); return; }

    // prevent duplicates
    if(toggle.querySelector('.layer-ctl-label')) return;

    var d = document.createElement('div');
    d.className = 'layer-ctl-label';
    d.innerHTML = '<div>Layer Control</div><div>(Click)</div>';  // <-- 2 lines
    toggle.appendChild(d);
  }

  if(document.readyState === "loading"){
    document.addEventListener("DOMContentLoaded", addLabel);
  } else {
    addLabel();
  }
})();
</script>
