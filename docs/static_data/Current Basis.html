<style>
  html, body { height: 100%; width: 100%; margin: 0; padding: 0; }

  /* Folium/Leaflet map container(s) */
  .folium-map, div[id^="map_"] { height: 100vh !important; width: 100vw !important; }
  
  /* Hide things on phones */
.desktop-only { display: block; }
@media (max-width: 768px){
  .desktop-only { display:none !important; }
}

  /* “card” style overlay */
  .map-card{
    position: fixed;
    z-index: 9999;
    background: rgba(255,255,255,0.85);
    backdrop-filter: blur(6px);
    border-radius: 14px;
    box-shadow: 0 10px 25px rgba(0,0,0,0.18);
    border: 1px solid rgba(0,0,0,0.08);
    padding: 10px 12px;
    font-family: Arial, sans-serif;
  }

  /* Title */
  .map-title{
    top: 10px;
    left: 50%;
    transform: translateX(-50%);
    max-width: min(92vw, 520px);
    text-align: center;
  }
  .map-title h3{ margin: 0; font-size: 18px; line-height: 1.15; }
  
      /* Move ONLY the LayerControl down from the top */
    .leaflet-top.leaflet-right .leaflet-control-layers{
      margin-top: 2px !important;   /* <-- change this number */
    }


  /* Legend (collapsible with <details>) */
  .map-legend{
    top: 40px;
    right: 10px;
    max-width: min(60vw, 360px);
    font-size: 12px;
  }
  
      /* ===== Branca colorbar (LinearColormap) ===== */
    .leaflet-top.leaflet-right .legend.leaflet-control{
      margin-right: 50px !important;  /* bigger = farther LEFT */
    }

    .legend.leaflet-control svg g.tick text{
      font-size: 12px !important;      /* adjust */
      font-weight: 500;
    }


  .map-legend summary{ cursor: pointer; font-weight: 700; }

  /* Charts panel (desktop) */
  .chart-panel{
    top: 70px;
    left: 10px;
    width: 190px;
  }

  /* “FAB” button for mobile to toggle charts */
  .fab{
    position: fixed;
    left: 14px;
    bottom: 14px;
    z-index: 10000;
    border: none;
    border-radius: 999px;
    padding: 12px 14px;
    box-shadow: 0 10px 25px rgba(0,0,0,0.25);
    background: rgba(255,255,255,0.92);
    font-weight: 700;
  }

  /* Modal for charts (works on iOS/Android; avoids pop-up blockers) */
  #chart-modal{
    display:none;
    position: fixed;
    inset: 0;
    z-index: 20000;
    background: rgba(0,0,0,0.65);
    padding: 12px;
  }
  #chart-modal .inner{
    height: 100%;
    width: 100%;
    background: rgba(255,255,255,0.98);
    border-radius: 14px;
    overflow: auto;
    position: relative;
    display:flex;
    align-items:center;
    justify-content:center;
  }
  #chart-modal img{
    max-width: 100%;
    max-height: 100%;
    height: auto;
    width: auto;
  }
  #chart-modal .close{
    position: absolute;
    top: 8px;
    right: 10px;
    border: none;
    border-radius: 10px;
    padding: 8px 10px;
    font-weight: 800;
  }

    .chart-panel{ display:none !important; }

/* Put Leaflet controls (LayerControl, zoom, etc.) ABOVE custom overlays */

.leaflet-bottom{
  z-index: 20050 !important;
}

    <script>
    (function(){
      function formatTicks(){
        document
          .querySelectorAll('.legend.leaflet-control svg g.tick text')
          .forEach(function(t){
            var raw = (t.textContent || "").trim();
            if(!raw) return;
    
            // Don’t double-format
            if(raw.startsWith("$")) return;
    
            // Handle Unicode minus + commas
            var cleaned = raw.replace(/\u2212/g, "-").replace(/,/g, "").trim();
            var v = Number(cleaned);
    
            if(Number.isFinite(v)){
              t.textContent = "$" + v.toFixed(2);
            }
          });
      }
    
      function waitForLegend(){
        var svg = document.querySelector('.legend.leaflet-control svg');
        if(svg){
          formatTicks();
    
          // Re-apply if anything changes inside the legend
          var obs = new MutationObserver(function(){ formatTicks(); });
          obs.observe(svg, {subtree:true, childList:true, characterData:true});
        } else {
          setTimeout(waitForLegend, 100);
        }
      }
    
      if(document.readyState === "loading"){
        document.addEventListener("DOMContentLoaded", waitForLegend);
      } else {
        waitForLegend();
      }
    })();
    </script>
    
    
<script>
(function() {
  function syncCityLabels() {
    var map = map_06dbac7777873b432730d60b2d4e6dc5;
    var labels = feature_group_c7275d0a79141854dcc065e5a27c1cd9;
    if(!map || !labels) return;

    // Match your CSS breakpoint: phone is <= 768px
    var desktop = window.matchMedia("(min-width: 769px)").matches;

    if(desktop) {
      if(!map.hasLayer(labels)) map.addLayer(labels);
    } else {
      if(map.hasLayer(labels)) map.removeLayer(labels);
    }
  }

  // run once after render
  setTimeout(syncCityLabels, 0);

  // keep correct if someone rotates/resizes
  window.addEventListener("resize", function() {
    clearTimeout(window.__cityLblTimer);
    window.__cityLblTimer = setTimeout(syncCityLabels, 150);
  });
})();
</script>

<script>
const charts = {
  state: "state_avg.png?v=121525",
  top_ten: "lcfs_top_ten.png?v=121525"
};

function openChart(key){
  const src = charts[key] || "";
  if(!src) return;
  document.getElementById("chart-img").src = src;
  document.getElementById("chart-modal").style.display = "block";
}

function closeChart(e){
  if(e.target.id === "chart-modal") {
    document.getElementById("chart-modal").style.display = "none";
    document.getElementById("chart-img").src = "";
  }
}

function forceClose(){
  document.getElementById("chart-modal").style.display = "none";
  document.getElementById("chart-img").src = "";
}

function toggleCharts(){
  const p = document.getElementById("chart-panel");
  if(!p) return;
  p.style.display = (p.style.display === "none" || p.style.display === "") ? "block" : "none";
}
</script>
